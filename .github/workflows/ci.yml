name: ci
on:
  pull_request:
  push:
    branches: [main]

# plants.json is currently validated only by js/ (zod, real source of truth).
# - py/ validator is out of sync with the data (Difficulty-as-object vs
#   Difficulty-as-number, snake_case id vs kebab-case, different envelope).
# - schema/plant.schema.json is likewise stale (expects `sources` field).
# Both will be regenerated from zod via zod-to-json-schema + datamodel-
# code-generator in a follow-up, then wired back into CI.

jobs:
  js:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: js/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  publish:
    needs: js
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: js/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@aquascape"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
